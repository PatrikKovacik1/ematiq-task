deploymentMode: SimpleScalable

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 3
  
  storage:
    type: s3
    s3:
      region: eu-central-1
      bucketnames: loki-storage-${account_id}
      s3forcepathstyle: false 
      
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: index_
          period: 24h

  limits_config:
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100

write:
  replicas: 3
  persistence:
    size: 50Gi

read:
  replicas: 2

backend:
  replicas: 2

gateway:
  enabled: true
  service:
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-internal: "true"

serviceAccount:
  create: false
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: "${loki_role_arn}"